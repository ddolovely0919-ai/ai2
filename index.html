<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 숏폼 커스텀 생성 솔루션</title>
    <style>
        :root { --primary: #007AFF; --bg: #f5f5f7; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* 설정 패널 */
        .setup-container { background: white; padding: 25px; border-radius: 18px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); width: 100%; max-width: 450px; margin-bottom: 30px; }
        h2 { font-size: 20px; margin-top: 0; color: #1d1d1f; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #86868b; margin-bottom: 8px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 10px; box-sizing: border-box; }
        
        /* 누끼 이미지 슬롯 (3개) */
        .object-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        .btn-generate { width: 100%; background: #000; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-generate:hover { background: #333; }

        /* 숏폼 플레이어 */
        #playerArea { display: none; width: 100%; max-width: 360px; height: 640px; background: #000; border-radius: 24px; overflow: hidden; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        /* 배경 영상 효과 (이미지를 영상처럼 움직이게 함) */
        .bg-video-sim { width: 100%; height: 100%; object-fit: cover; position: absolute; animation: kenburns 20s infinite alternate; }
        @keyframes kenburns { 
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(-2%, -2%); }
        }

        /* 상품 누끼 오버레이 */
        .product-overlay { position: absolute; width: 70%; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); }

        /* 하단 컨트롤 */
        .player-ui { position: absolute; bottom: 40px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 20; }
        .swatch-group { display: flex; gap: 12px; background: rgba(255,255,255,0.2); backdrop-filter: blur(15px); padding: 12px 20px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.3); }
        .swatch { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; cursor: pointer; background-size: cover; background-position: center; transition: 0.2s; }
        .swatch.active { transform: scale(1.2); border-color: #000; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        
        .loading-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; color:white; z-index:100; display:none; }
    </style>
</head>
<body>

    <div class="setup-container">
        <h2>📱 숏폼 빌더 세팅</h2>
        
        <div class="input-group">
            <label>1. Gemini API Key</label>
            <input type="text" id="apiKey" placeholder="AIzaSy...">
        </div>

        <div class="input-group">
            <label>2. 배경 이미지 (영상화될 메인)</label>
            <input type="file" id="bgInput" accept="image/*">
        </div>

        <div class="input-group">
            <label>3. 교체될 상품 누끼컷 (3개)</label>
            <div class="object-slots">
                <input type="file" class="obj-input" accept="image/*">
                <input type="file" class="obj-input" accept="image/*">
                <input type="file" class="obj-input" accept="image/*">
            </div>
        </div>

        <button class="btn-generate" onclick="generateShortform()">영상 생성 및 합성하기</button>
    </div>

    <div id="playerArea">
        <div class="loading-overlay" id="loader">AI 처리 중...</div>
        <img id="mainBg" class="bg-video-sim" src="">
        <img id="objOverlay" class="product-overlay" src="">
        
        <div class="player-ui">
            <div class="swatch-group" id="swatchGroup">
                </div>
        </div>
    </div>

    <script>
        let bgUrl = '';
        let objUrls = [];
        let autoPlayTimer;

        function generateShortform() {
            const bgFile = document.getElementById('bgInput').files[0];
            const objFiles = document.querySelectorAll('.obj-input');
            const apiKey = document.getElementById('apiKey').value;

            if(!bgFile || !objFiles[0].files[0] || !apiKey) {
                alert("API 키, 배경 이미지, 그리고 최소 1개 이상의 상품 이미지를 넣어주세요.");
                return;
            }

            // 로딩 표시
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('playerArea').style.display = 'block';

            // 이미지 URL화
            bgUrl = URL.createObjectURL(bgFile);
            objUrls = Array.from(objFiles).filter(i => i.files[0]).map(i => URL.createObjectURL(i.files[0]));

            // AI 가공 시뮬레이션 (3초)
            setTimeout(() => {
                renderPlayer();
                document.getElementById('loader').style.display = 'none';
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 2500);
        }

        function renderPlayer() {
            const mainBg = document.getElementById('mainBg');
            const objOverlay = document.getElementById('objOverlay');
            const swatchGroup = document.getElementById('swatchGroup');

            mainBg.src = bgUrl;
            objOverlay.src = objUrls[0];
            swatchGroup.innerHTML = '';

            objUrls.forEach((url, idx) => {
                const btn = document.createElement('div');
                btn.className = `swatch ${idx === 0 ? 'active' : ''}`;
                btn.style.backgroundImage = `url(${url})`;
                btn.onclick = () => selectObject(idx);
                swatchGroup.appendChild(btn);
            });

            startAutoPlay();
        }

        function selectObject(idx) {
            clearInterval(autoPlayTimer);
            const objOverlay = document.getElementById('objOverlay');
            const swatches = document.querySelectorAll('.swatch');

            // 교체 애니메이션
            objOverlay.style.opacity = '0';
            objOverlay.style.transform = 'translate(-50%, -45%) scale(0.9)';

            setTimeout(() => {
                objOverlay.src = objUrls[idx];
                objOverlay.style.opacity = '1';
                objOverlay.style.transform = 'translate(-50%, -50%) scale(1)';
                
                swatches.forEach(s => s.classList.remove('active'));
                swatches[idx].classList.add('active');
            }, 300);
        }

        function startAutoPlay() {
            let current = 0;
            autoPlayTimer = setInterval(() => {
                current = (current + 1) % objUrls.length;
                selectObject(current);
            }, 3500);
        }
    </script>
</body>
</html>
